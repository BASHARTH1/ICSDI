<header class="site-header" [ngClass]="{ 'site-header--scrolled': scrolled(), 'site-header--menu-open': menuOpen() }">
  <div class="container header-inner">
    <a class="brand" href="#home" (click)="closeMenu()">
      <img class="brand-logo" src="img/icsdi-logo.png"
           alt="ICSDI — International Conference on Sustainable Development & Innovation" />
    </a>

    <nav class="nav" [ngClass]="{ 'nav--open': menuOpen() }" [attr.aria-hidden]="!menuOpen()">
      @for (link of navLinks; track link.href) {
        <a [href]="link.href" class="nav-link" (click)="closeMenu()">{{ link.label }}</a>
      }
      <a href="#register" class="btn btn--primary nav-cta" (click)="closeMenu()">Register</a>
    </nav>

    <button class="nav-toggle" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()" aria-label="Toggle menu" aria-controls="primary-nav">
      <i class="bi" [ngClass]="menuOpen() ? 'bi-x-lg' : 'bi-list'"></i>
    </button>
  </div>
  <div class="nav-backdrop" (click)="closeMenu()" aria-hidden="true"></div>
</header>
