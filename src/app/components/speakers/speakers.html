<section id="speakers" class="section">
  <div class="container">
    <div class="section-head">
      <span class="eyebrow"><i class="bi bi-mic"></i> Keynote Speakers</span>
      <h2>Keynote Speakers</h2>
      <p>
        Distinguished academics and industry leaders share insights on sustainable development,
        innovation and the road to 2030.
      </p>
    </div>

    <div class="speakers-grid">
      @for (s of speakers; track s.name) {
        <article class="speaker-card glass" [style.--accent]="s.accent">
          <div class="speaker-photo">
            <img [src]="s.photo" [alt]="s.name" loading="lazy" />
          </div>
          <h3 class="speaker-name">{{ s.name }}</h3>
          <p class="speaker-role">{{ s.role }}</p>
          <p class="speaker-org"><i class="bi bi-building"></i> {{ s.org }}</p>
          <p class="speaker-bio">{{ s.bio }}</p>
        </article>
      }
    </div>
  </div>
</section>
